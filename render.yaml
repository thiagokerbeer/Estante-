# Blueprint Render — PostgreSQL grátis incluso (não é obrigatório usar Neon).
# Após o primeiro deploy, defina FRONTEND_URL no painel com a URL da Vercel (CORS).
databases:
  - name: estante-plus-db
    plan: free
    region: oregon
    databaseName: estante
    user: estante

services:
  - type: web
    name: estante-plus-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: estante-plus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

# Blueprint Render — banco externo (Neon).
# DATABASE_URL e FRONTEND_URL precisam ser definidos manualmente no painel do Render após o primeiro deploy.
# JWT_SECRET é gerado automaticamente pelo Blueprint.
services:
  - type: web
    name: estante-plus-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
